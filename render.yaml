services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: heisenburg-api
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm turbo run build --filter=@fbm/shared && pnpm turbo run build --filter=@fbm/api
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ENQUIRY_TO
        sync: false
      - key: SENTRY_DSN
        sync: false

  # ── Frontend Static Site ──────────────────────────────────────────────────────
  - type: static
    name: heisenburg-web
    buildCommand: npm install -g pnpm && pnpm install && pnpm turbo run build --filter=@fbm/shared && pnpm turbo run build --filter=@fbm/web
    staticPublishPath: apps/web/dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SENTRY_DSN
        sync: false
